<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>BPMN-Diff</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" href="https://esm.sh/bpmn-js@18.14.0/dist/assets/diagram-js.css">
    <link rel="stylesheet" href="https://esm.sh/bpmn-js@18.14.0/dist/assets/bpmn-js.css">
    <link rel="stylesheet" href="https://esm.sh/camunda-dmn-js@3.7.0/dist/assets/camunda-cloud-modeler.css">
    <link rel="stylesheet" href="./styles.css"/>
    <script>
        console.log("index.html: initial script execution");
        window.onerror = function(msg, url, line, col, error) {
            var extra = !url ? '' : '\nURL: ' + url + '\nLine: ' + line + ':' + col;
            console.error("Global error: " + msg + extra);
            if (error && error.stack) console.error(error.stack);
            return false;
        };
        window.onunhandledrejection = function(event) {
            console.error("Unhandled Rejection: " + event.reason);
        };
        window.addEventListener('load', function() {
            console.log("index.html: window load event fired");
        });
    </script>
</head>
<body>
<header class="header">
    <div class="logo">BPMN-Diff</div>
    <div class="controls">
        <span style="display: inline-block; margin-left: 10px;">
            Left: <input type="file" id="file-left" accept=".bpmn,.dmn" />
            Right: <input type="file" id="file-right" accept=".bpmn,.dmn" />
        </span>
    </div>
</header>
<div class="main-content">
    <div class="content-wrapper">
        <div class="canvas-container">
            <div id="canvas-left" class="canvas"></div>
            <div id="canvas-right" class="canvas"></div>
            <div class="io-alerts">
                <div class="io-alert io-alert-info" id="no-diagram-alert">
                    Select two BPMN or DMN diagrams to compare them.
                </div>
            </div>
        </div>

        <aside class="diff-items" id="diff-items-container" style="display: none;">
            <div class="diff-items-header">
                Diff Details
            </div>
            <ul id="changes-list"></ul>
        </aside>
    </div>
</div>

<script type="module" src="./local-dev.js"></script>
</body>
</html>
