<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>BPMN-Diff</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" href="https://esm.sh/bpmn-js@18.14.0/dist/assets/diagram-js.css"
          integrity="sha384-Wpvj43O/avgeS68y1vM9p71L6p6zjobXkodnp9AdDAzc9BdlrZ72b4iy5mCK7sf1" crossorigin="anonymous">
    <link rel="stylesheet" href="https://esm.sh/bpmn-js@18.14.0/dist/assets/bpmn-js.css"
          integrity="sha384-d5fPuJ8qoomhVwsLNT3CIO4Wr1Ur5kNIP6IkZ1c1m5deqBd43hlGyuXPeFUiuA0N" crossorigin="anonymous">
    <link rel="stylesheet" href="https://esm.sh/dmn-js@17.8.0/dist/assets/dmn-js-shared.css"
          integrity="sha384-isv0wOGopGsPwmmbngwPeqDxcLVFa1Cab4oJskBlYuKgMQNk5PMHEdPvuDSJVRjr" crossorigin="anonymous">
    <link rel="stylesheet" href="https://esm.sh/dmn-js@17.8.0/dist/assets/dmn-js-drd.css"
          integrity="sha384-QmVD7q8rYJjxsBrQ3VQ8XeEc/W2oPPAUvcV0MqK4e8SQJKfkrP3+3cRyWBu47OgI" crossorigin="anonymous">
    <link rel="stylesheet" href="https://esm.sh/dmn-js@17.8.0/dist/assets/dmn-js-decision-table.css"
          integrity="sha384-W0CzFQY0tEuPBRkkqVvhVD2uR0jE0zKPkMHNZ8SHBNlD6sxPqIEh0Y+gAC+ZJo5H" crossorigin="anonymous">
    <link rel="stylesheet" href="https://esm.sh/dmn-js@17.8.0/dist/assets/dmn-js-literal-expression.css"
          integrity="sha384-apRPIRKJ6fulOzeEojeSlLSVmIGvvvtYsI+Khkzw5JgDl6CSLrMaWeo0hCdXvg6n" crossorigin="anonymous">
    <link rel="stylesheet" href="https://esm.sh/dmn-js@17.8.0/dist/assets/dmn-font/css/dmn.css"
          integrity="sha384-/pILLz6fKXzyCD1KxKRGciD8ui2T/Px86d3ntwEMJpxy74BJ6FgmpAKXauD+LgmG" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles.css"/>
</head>
<body>
<div class="main-content">
    <div class="content-wrapper">
        <div class="canvas-container">
            <div id="canvas-left" class="canvas"></div>
            <div id="canvas-right" class="canvas"></div>
            <div class="io-alerts">
                <div class="io-alert io-alert-info" id="no-diagram-alert">
                    Select two BPMN or DMN diagrams to compare them.
                </div>
            </div>
        </div>

        <aside class="diff-items" id="diff-items-container" style="display: none;">
            <div class="diff-items-header">
                Diff Details
            </div>
            <ul id="changes-list"></ul>
        </aside>
    </div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
